name: Tests

on:
  push:
  pull_request:

env:
  WHATSAPP_ENABLED: "false"
  TRADING_ENABLED: "false"
  WITHDRAWALS_ENABLED: "false"
  ORDER_EXECUTION_ENABLED: "false"
  EXCHANGE_MODE: "disabled"
  NEWS_API_KEY: ""
  COINGECKO_API_KEY: ""
  CRYPTOPANIC_API_KEY: ""
  OPENAI_API_KEY: ""
  HTTP_MAX_RETRIES: "2"
  HTTP_BACKOFF_SECONDS: "0.5"
  HTTP_CACHE_TTL_SECONDS: "60"
  HTTP_CACHE_ENABLED: "true"

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project
        run: python -m pip install -e ".[dev]"

      - name: Compile source and tests
        run: python3 -m compileall src tests scripts

      - name: Ruff lint
        run: python -m ruff check src tests scripts

      - name: Ruff format check
        run: python -m ruff format --check src tests scripts

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Run coverage
        run: python -m coverage run -m unittest discover -s tests

      - name: Coverage report
        run: python -m coverage report --fail-under=80

      - name: Run mock full pipeline
        run: python3 scripts/test_full_pipeline_mock.py

      - name: Run mock orchestrator
        run: python3 scripts/test_orchestrator_mock.py

      - name: Run mock CLI
        run: python3 scripts/test_cli_mock.py

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Build Docker image
        run: docker build -t crypto-market-agents .
