name: Tests

on:
  push:
  pull_request:

jobs:
  tests:
    name: Python 3.11
    runs-on: ubuntu-latest
    env:
      WHATSAPP_ENABLED: "false"
      TRADING_ENABLED: "false"
      WITHDRAWALS_ENABLED: "false"
      ORDER_EXECUTION_ENABLED: "false"
      EXCHANGE_MODE: "disabled"
      NEWS_API_KEY: ""
      COINGECKO_API_KEY: ""
      CRYPTOPANIC_API_KEY: ""
      OPENAI_API_KEY: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project
        run: python -m pip install -e ".[dev]"

      - name: Compile source and tests
        run: python3 -m compileall src tests scripts

      - name: Ruff lint
        run: python -m ruff check src tests scripts

      - name: Ruff format check
        run: python -m ruff format --check src tests scripts

      - name: Run unit tests
        run: python3 -m unittest discover -s tests

      - name: Run coverage
        run: python -m coverage run -m unittest discover -s tests

      - name: Coverage report
        run: python -m coverage report

      - name: Run mock full pipeline
        run: python3 scripts/test_full_pipeline_mock.py

      - name: Run mock orchestrator
        run: python3 scripts/test_orchestrator_mock.py

      - name: Build Docker image
        run: docker build -t crypto-market-agents .
